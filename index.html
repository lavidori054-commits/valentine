<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>האם תהיי חברה שלי?</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffe6ea;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
            position: relative;
        }

        h1 {
            color: #ff4d6d;
            margin-bottom: 10px;
            font-size: 2rem;
        }

        p {
            color: #555;
            font-size: 1.1rem;
            margin-bottom: 40px;
            line-height: 1.5;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 30px;
            height: 60px;
            align-items: center;
            position: relative;
        }

        button {
            padding: 12px 35px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.1s ease;
            font-weight: bold;
        }

        #yesBtn {
            background-color: #ff4d6d;
            color: white;
        }

        #yesBtn:hover {
            background-color: #ff758f;
            transform: scale(1.1);
        }

        #noBtn {
            background-color: #778da9;
            color: white;
            position: absolute;
            /* מיקום התחלתי בטוח שלא תלוי ב-JS */
            left: 25%; 
            top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>תהיי חברה שלי? 💖</h1>
        <p>"כתבתי קוד עם כפתור בלתי אפשרי, כי לנסות לא לאהוב אותך זה פשוט לא בא בחשבון."</p>
        
        <div class="buttons">
            <button id="yesBtn" onclick="celebrate()">כן!</button>
            <button id="noBtn">לא</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');

        // פונקציה שמבריחה את כפתור ה"לא" למיקום אקראי לחלוטין על המסך
        function moveButton() {
            const padding = 60; 
            const maxX = window.innerWidth - noBtn.offsetWidth - padding;
            const maxY = window.innerHeight - noBtn.offsetHeight - padding;

            // הגרלת מיקומים
            const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxY));

            // שינוי המיקום לכל מקום במסך (body) כדי שלא ייחסם בתוך התיבה
            noBtn.style.position = 'fixed';
            noBtn.style.left = `${randomX}px`;
            noBtn.style.top = `${randomY}px`;

            // הגדלת כפתור ה"כן" בכל ניסיון ללחוץ על "לא"
            const currentScale = parseFloat(yesBtn.style.transform.replace('scale(', '')) || 1;
            yesBtn.style.transform = `scale(${currentScale + 0.15})`;
        }

        // מאזיני אירועים – עכבר ומסכי מגע
        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault(); // מונע לחיצה סלולרית לפני הבריחה
            moveButton();
        });

        // מסך הניצחון
        function celebrate() {
            document.querySelector('.container').innerHTML = `
                <h1 style="font-size: 3rem;">יששש! 🎉</h1>
                <p style="font-size: 1.5rem; color: #ff4d6d;">ידעתי שלא תוכלי לסרב... 😉❤️</p>
            `;
            // מעלים את כפתור הלא שברח אם הוא נשאר ברקע
            noBtn.style.display = 'none';
        }
    </script>

</body>
</html>
